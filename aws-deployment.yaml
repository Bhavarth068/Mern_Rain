AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for Rain Forecasting System'

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: must be the name of an existing EC2 KeyPair.
  
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.medium
    AllowedValues: [t2.small, t2.medium, t3.medium, t3.large]

Resources:
  RainSystemSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH, HTTP, and App Ports
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5001
          ToPort: 5001
          CidrIp: 0.0.0.0/0

  RainSystemInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: ami-0c7217cdde317cfec # Ubuntu 22.04 LTS (us-east-1) - Update based on your region
      SecurityGroups:
        - !Ref RainSystemSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          apt-get update -y
          apt-get upgrade -y
          
          # Install Node.js
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          
          # Install Python and Pip
          apt-get install -y python3-pip python3-venv git
          
          # Install PM2
          npm install -g pm2 serve
          
          # Setup project structure
          mkdir -p /home/ubuntu/rain-app
          cd /home/ubuntu/rain-app

          # NOTE: You will need to git clone or SCP your files here.
          # Example: git clone https://github.com/your-username/your-repo.git .

Outputs:
  InstancePublicIP:
    Description: Public IP of the newly created EC2 instance
    Value: !GetAtt RainSystemInstance.PublicIp
  AppURL:
    Description: URL to access the application
    Value: !Sub "http://${RainSystemInstance.PublicIp}:3000"

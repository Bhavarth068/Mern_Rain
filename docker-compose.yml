version: '3.8'

services:
  # MongoDB - Representing the Cloud Database (Atlas) in local dev
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # ML Prediction Service (Flask)
  ml-service:
    build: ./ml
    ports:
      - "5001:5001"
    environment:
      - PYTHONUNBUFFERED=1

  # Backend API (Node.js)
  backend:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - ml-service
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/rain_forecast
      - ML_SERVICE_URL=http://ml-service:5001
      - PORT=5000

  # Frontend (React)
  frontend:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
